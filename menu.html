<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Menu</title>

  <!-- REQUIRED: Internal style sheet for unique menu style -->
  <style>
    body {
      margin: 0;
      padding: 18px;
      font-family: Arial, sans-serif;
      background: #101014;
      color: #fff;
    }

    h2 {
      margin: 0 0 14px 0;
      font-size: 18px;
      letter-spacing: 0.4px;
    }

    a {
      display: block;
      padding: 10px 12px;
      margin: 10px 0;
      text-decoration: none;
      color: #fff;
      background: #1f1f28;
      border: 1px solid #2e2e3a;
      border-radius: 10px;
    }

    a:hover {
      background: #2a2a36;
    }

    .mini {
      margin-top: 14px;
      font-size: 12px;
      color: #b9b9c6;
      line-height: 1.4;
    }
  </style>
</head>

<body>
  <h2>Project 1 Menu</h2>

  <!-- Links must load into the RIGHT iframe -->
  <a href="home.html" target="displayFrame">Home</a>
  <a href="resume.html" target="displayFrame">Resume</a>
  <a href="contact.html" target="displayFrame">Contact Us</a>

  <div class="mini">
    Click any link — it will open in the right frame.
  </div>
</body>
</html>
